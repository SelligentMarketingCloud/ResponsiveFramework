name: Validate PR Screenshots

permissions:
  actions: read
  pull-requests: write
  statuses: write

on:
  workflow_run:
    workflows: ["Validate Pull Request"]
    types: [completed]

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Capture and compare screenshots
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.stage-pages.outcome == 'success' }}
      eoa_url: ${{ steps.variables.outputs.EOA_URL }}
      pr_number: ${{ steps.pr-info.outputs.number }}
      check_diff_failed: ${{ steps.check-diff.outcome == 'failure' }}
      validate_success: ${{ steps.check-diff.outcome == 'success' }}
    environment:
      name: eoa
    steps:
      - id: variables
        run: echo "EOA_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/eoa/run-${{ github.run_id }}-${{ github.run_attempt }}/" >> "$GITHUB_OUTPUT"
      - name: Get PR info
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const pr = prs.data.find(pr => pr.head.sha === context.payload.workflow_run.head_sha);
            if (pr) {
              core.setOutput('number', pr.number);
              core.setOutput('branch', pr.head.ref);
            }
      - name: 📄 Checkout main branch
        uses: actions/checkout@v5
      - name: 📥 Download latest.html from PR artifact
        uses: actions/download-artifact@v4
        with:
          name: latest-html
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: source
      - name: Validate downloaded latest.html
        run: |
          # Ensure the artifact is an HTML file and not an executable
          file source/latest.html
          head -1 source/latest.html | grep -qiE '<!doctype html|<html' || (echo "Artifact is not a valid HTML file" && exit 1)
      - name: 📥 Download clients.txt from PR artifact
        uses: actions/download-artifact@v4
        with:
          name: clients-txt
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: emailonacid
      - name: 📥 Download baseline screenshots from PR artifact
        uses: actions/download-artifact@v4
        with:
          name: baseline-screenshots
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: diff/base
      - name: 🔨 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./emailonacid
      - name: 🧹 Clear output directory
        run: rm -f output/*.png 2>/dev/null || true
      - name: 📸 Capture screenshots
        id: screenshots
        run: npm run eoa
        working-directory: ./emailonacid
        env:
          EOA_ACCOUNT_PASSWORD: ${{ secrets.EOA_ACCOUNT_PASSWORD }}
          EOA_API_KEY: ${{ vars.EOA_API_KEY }}
      - name: Copy compare screenshots
        run: mkdir -p diff/compare && cp -r output/*.png diff/compare
      - name: Compare screenshots
        id: compare-screenshots
        run: mkdir -p ../diff/diff && npm run diff
        working-directory: ./emailonacid
      - name: Generate report screenshots
        if: success() || steps.compare-screenshots.conclusion == 'failure'
        run: npm run report-ci
        working-directory: ./emailonacid
      - name: Inject PR info into EOA report
        if: steps.pr-info.outputs.number != '' && (success() || steps.compare-screenshots.conclusion == 'failure')
        run: |
          node emailonacid/inject-pr-info.js \
            --owner '${{ github.repository_owner }}' \
            --repo '${{ github.event.repository.name }}' \
            --pr-number '${{ steps.pr-info.outputs.number }}' \
            --branch '${{ steps.pr-info.outputs.branch }}' \
            --eoa-url '${{ steps.variables.outputs.EOA_URL }}'
      - name: Fail if there are visual differences
        id: check-diff
        run: |
          cat diff/result.json
          exit $(jq -r .totalFailed diff/result.json)
      - name: Generate gallery
        if: steps.check-diff.outcome == 'success'
        run: npm run gallery
        working-directory: ./emailonacid
      - name: Stage pages report
        id: stage-pages
        if: success() || steps.check-diff.conclusion == 'failure'
        run: |
          mkdir -p pages-report
          if [ "${{ steps.check-diff.outcome }}" = "success" ]; then
            cp -r output/. pages-report/
          else
            cp -r diff/. pages-report/
          fi
      - name: Upload pages report
        if: always() && steps.stage-pages.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pages-report
          path: pages-report

  prepare-pages:
    name: Prepare EOA report for GitHub Pages
    needs: validate
    if: always() && needs.validate.outputs.pages_ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: 📥 Download pages report
        uses: actions/download-artifact@v4
        with:
          name: pages-report
          path: pages-report
      - name: 🗂️ Prepare EOA report
        uses: ./.github/actions/deploy-site
        with:
          mode: add-eoa
          source_path: pages-report
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}
          restore_root_from_release: 'true'
          deploy: 'false'

  deploy-pages:
    name: Publish EOA report to GitHub Pages
    needs: [validate, prepare-pages]
    if: always() && needs.prepare-pages.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  notify:
    name: Update PR status and comments
    needs: [validate, prepare-pages, deploy-pages]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: ✅ Mark PR as good to go
        if: needs.validate.outputs.pr_number && needs.validate.outputs.validate_success == 'true' && needs.deploy-pages.result == 'success'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: parseInt('${{ needs.validate.outputs.pr_number }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### :white_check_mark: Email rendering looks good to go!\n\n[View screenshot gallery](${{ needs.validate.outputs.eoa_url }})'
            })
      - name: Add PR comment
        if: needs.validate.outputs.pr_number && needs.validate.outputs.check_diff_failed == 'true' && needs.deploy-pages.result == 'success'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: parseInt('${{ needs.validate.outputs.pr_number }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### :warning: Your changes introduced visual differences.\n\n[View the differences here](${{ needs.validate.outputs.eoa_url }}index.html)`
            })
      - name: Report status to PR commit
        uses: actions/github-script@v8
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const validateSuccess = '${{ needs.validate.outputs.validate_success }}' === 'true';
            const deploySuccess = '${{ needs.deploy-pages.result }}' === 'success';
            const state = validateSuccess && deploySuccess ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              state: state,
              context: 'validate / Capture and compare screenshots',
              description: state === 'success' ? 'Email rendering looks good to go!' : 'Visual differences detected',
              target_url: '${{ needs.validate.outputs.eoa_url }}'
            })
