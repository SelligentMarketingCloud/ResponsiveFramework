name: Validate Responsive Framework

on:
  workflow_call:

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Capture and compare screenshots
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.stage-pages.outcome == 'success' }}
      eoa_url: ${{ steps.variables.outputs.EOA_URL }}
    environment:
      name: eoa
      url: ${{ steps.variables.outputs.EOA_URL }}
    steps:
      - id: variables
        run: echo "EOA_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/eoa/run-${{ github.run_id }}-${{ github.run_attempt }}/" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Restore diff from cache
        id: cache-diff-restore
        uses: actions/cache/restore@v4
        with:
          path: diff
          key: ${{ hashFiles('emailonacid/clients.txt') }}-${{ hashFiles('source/latest.html') }}-${{ hashFiles('output/*.png') }}-diff
      - name: Copy baseline screenshots for caching
        if: steps.cache-diff-restore.outputs.cache-hit != 'true'
        run: mkdir -p diff/base && cp -r output/*.png diff/base
      - name: Install dependencies
        if: steps.cache-diff-restore.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ./emailonacid
      - name: Capture screenshots
        id: screenshots
        if: steps.cache-diff-restore.outputs.cache-hit != 'true'
        run: npm run eoa
        working-directory: ./emailonacid
        env:
          EOA_ACCOUNT_PASSWORD: ${{ secrets.EOA_ACCOUNT_PASSWORD }}
          EOA_API_KEY: ${{ vars.EOA_API_KEY }}
      - name: Copy compare screenshots for caching
        if: steps.cache-diff-restore.outputs.cache-hit != 'true'
        run: mkdir -p diff/compare && cp -r output/*.png diff/compare
      - name: Compare screenshots
        if: steps.cache-diff-restore.outputs.cache-hit != 'true'
        id: create-screenshots
        run: mkdir -p ../diff/diff && npm run diff
        working-directory: ./emailonacid
      - name: Generate report screenshots
        if: steps.cache-diff-restore.outputs.cache-hit != 'true' && (success() || steps.create-screenshots.conclusion == 'failure')
        run: npm run report-ci
        working-directory: ./emailonacid
      - name: Save diff to cache
        if: steps.cache-diff-restore.outputs.cache-hit != 'true'
        id: cache-primes-save
        uses: actions/cache/save@v4
        with:
          path: diff
          key: ${{ steps.cache-diff-restore.outputs.cache-primary-key }}
      - name: Fail if there are visual differences
        id: check-diff
        run: |
          cat diff/result.json
          exit $(jq -r .totalFailed diff/result.json)
      - name: Generate gallery
        if: steps.check-diff.outcome == 'success'
        run: npm run gallery
        working-directory: ./emailonacid
      - name: Stage pages report
        id: stage-pages
        if: success() || steps.check-diff.conclusion == 'failure'
        run: |
          mkdir -p pages-report
          if [ "${{ steps.check-diff.outcome }}" = "success" ]; then
            cp -r output/. pages-report/
          else
            cp -r diff/. pages-report/
          fi
      - name: Upload pages report
        if: always() && steps.stage-pages.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pages-report
          path: pages-report

  prepare-pages:
    name: Prepare EOA report for GitHub Pages
    needs: validate
    if: always() && needs.validate.outputs.pages_ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: 📥 Download pages report
        uses: actions/download-artifact@v4
        with:
          name: pages-report
          path: pages-report
      - name: 🗂️ Prepare EOA report
        uses: ./.github/actions/deploy-site
        with:
          mode: add-eoa
          source_path: pages-report
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}
          restore_root_from_release: 'true'
          deploy: 'false'

  deploy-pages:
    name: Publish EOA report to GitHub Pages
    needs: [validate, prepare-pages]
    if: always() && needs.prepare-pages.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
