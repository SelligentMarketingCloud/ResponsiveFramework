name: Update EOA Baseline Screenshot

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number whose baseline should be updated'
        required: true
        type: string
      client_id:
        description: 'Email client ID to update (filename without .png, e.g. m365com-lm_chrcurrent_win10)'
        required: true
        type: string
      eoa_url:
        description: 'Base URL of the EOA Pages report (must end with /)'
        required: true
        type: string

jobs:
  update:
    name: Commit updated baseline via LFS
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.pr_number }}" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid pr_number: must be numeric"
            exit 1
          fi
          if [[ ! "${{ inputs.client_id }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid client_id: must contain only alphanumeric characters, hyphens, and underscores"
            exit 1
          fi
          if [[ ! "${{ inputs.eoa_url }}" =~ ^https://[a-zA-Z0-9-]+\.github\.io/ ]]; then
            echo "::error::Invalid eoa_url: must start with https://<org>.github.io/"
            exit 1
          fi

      - name: Get PR branch
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ inputs.pr_number }}'),
            });
            core.setOutput('branch', pr.data.head.ref);

      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          lfs: true
          token: ${{ github.token }}

      - name: Download compare image from EOA report
        run: |
          image_url="${{ inputs.eoa_url }}compare/${{ inputs.client_id }}.png"
          echo "Downloading ${image_url}"
          curl -fsSL "${image_url}" -o "output/${{ inputs.client_id }}.png"

      - name: Commit and push updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "output/${{ inputs.client_id }}.png"
          if git diff --staged --quiet; then
            echo "Baseline image is already up to date – nothing to commit."
          else
            git commit -m "chore(eoa): update baseline screenshot for ${{ inputs.client_id }}"
            git push
          fi
